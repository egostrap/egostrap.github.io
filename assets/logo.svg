<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <!-- Vibrant Blue-to-Cyan Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#0066ff" />
    </linearGradient>
    
    <!-- Mask for carving out the stylized E -->
    <mask id="cutout">
      <rect width="120" height="120" fill="white" />
      <!-- The block 'E' shape -->
      <path d="M 46 42 h 26 M 46 56 h 18 M 46 70 h 26 M 50 42 v 28" 
            stroke="black" stroke-width="8" stroke-linecap="square" stroke-linejoin="miter" fill="none" />
    </mask>
  </defs>
  
  <g transform="rotate(-15 60 60)">
    <!-- Tilted Square with 'E' Cutout -->
    <rect x="25" y="25" width="70" height="70" rx="14" fill="url(#blueGrad)" mask="url(#cutout)" />
  </g>
</svg>
